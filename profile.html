<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #0d2347;
            border-bottom: 1px solid #1c355c;
        }

        header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header img {
            height: 40px;
        }

        header h1 {
            font-size: 20px;
            margin: 0;
            color: #9bbcff;
        }

        header .right {
            text-align: right;
            font-size: 14px;
        }

        #logoutBtn {
            color: #ff4d4d;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }

        .container {
            padding: 20px;
        }

        .profile-card {
            background-color: #0d2347;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #1c355c;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .profile-card img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #9bbcff;
            margin-bottom: 15px;
        }

        .profile-name {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .profile-username {
            font-size: 14px;
            color: #9bbcff;
            margin-bottom: 15px;
        }

        .profile-info {
            text-align: left;
            margin-top: 10px;
            font-size: 15px;
        }

        .profile-info p {
            margin: 6px 0;
        }

        a.nav-link {
            color: #9bbcff;
            text-decoration: none;
            font-size: 14px;
        }

        a.nav-link:hover {
            color: #d6e4ff;
        }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem("loggedIn")) {
            window.location.href = "index.html";
        }
    </script>

    <header>
        <div class="left">
            <img src="VUB.png" alt="Bank Logo">
            <h1>Veterans Ultimate Bank</h1>
        </div>
        <div class="right">
            <span>Profile</span>
            <span><a id="logoutBtn">Logout</a></span>
        </div>
    </header>

    <div class="container">
        <div class="profile-card">
            <img src="eric_todd.jpeg" alt="Eric Todd">

            <div class="profile-name">Eric Todd</div>
            <div class="profile-username">Username: EricTodd1$</div>

            <div class="profile-info">
                <p><strong>Email:</strong> herictodd66@gmail.com</p>
                <p><strong>Date of Birth:</strong> 03/06/1957</p>
                <p><strong>Location:</strong> Tampa, Florida, USA</p>
                <p><strong>Primary Account:</strong> Checking</p>
            </div>

            <p style="margin-top:15px;">
                <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById("logoutBtn").onclick = function () {
            localStorage.removeItem("loggedIn");
            sessionStorage.removeItem("welcomeShown");
            window.location.href = "index.html";
        };
    </script>

</body>
</html>
