<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        .navbar {
            background-color: #0d2347;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1c355c;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .navbar-left img {
            height: 45px;
            margin-right: 15px;
        }

        .navbar-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #9bbcff;
            font-weight: bold;
        }

        .navbar-right img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile-container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            background: #0d2347;
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #1c355c;
        }

        .profile-header {
            text-align: center;
        }

        .profile-header img {
            height: 120px;
            width: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
        }

        .profile-header h2 {
            margin: 0;
            color: #9bbcff;
        }

        .profile-details {
            margin-top: 30px;
            font-size: 18px;
            line-height: 1.8;
        }

        .profile-details strong {
            color: #9bbcff;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="navbar-left">
            <img src="VUB.png" alt="Veterans Ultimate Bank Logo">
            <div class="navbar-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
            </div>
        </div>

        <div class="navbar-right">
            <img src="eric_todd.jpeg" alt="Profile Photo">
        </div>
    </div>

    <div class="profile-container">
        <div class="profile-header">
            <img src="eric_todd.jpeg" alt="Profile Photo">
            <h2>Eric Todd</h2>
        </div>

        <div class="profile-details">
            <p><strong>Full Name:</strong> Eric Todd</p>
            <p><strong>Email:</strong> herictodd66@gmail.com</p>
            <p><strong>Date of Birth:</strong> 03/06/1957</p>
            <p><strong>Gender:</strong> Male</p>
            <p><strong>Location:</strong> Tampa, Florida, USA</p>
        </div>
    </div>

</body>
</html>
