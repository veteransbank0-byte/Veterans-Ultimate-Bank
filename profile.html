<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Veterans Unlimited Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: #ffffff;
        }

        /* NAVBAR */
        .top-nav {
            background-color: #0d2347;
            border-bottom: 1px solid #1f2d45;
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left img {
            height: 40px;
            border-radius: 4px;
        }

        .nav-center a {
            margin: 0 15px;
            text-decoration: none;
            color: #bfc9d9;
            font-size: 15px;
            font-weight: bold;
        }

        .nav-center a:hover {
            color: #1a4fa3;
        }

        .profile-pic-small {
            height: 38px;
            width: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1a4fa3;
        }

        /* PROFILE PAGE */
        .content {
            max-width: 800px;
            margin: 30px auto;
            background-color: #0d2347;
            padding: 25px;
            border-radius: 6px;
            border: 1px solid #1f2d45;
        }

        .section-title {
            font-size: 24px;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
        }

        .profile-large {
            height: 130px;
            width: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #1a4fa3;
            display: block;
            margin: 0 auto 20px auto;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .field-label {
            font-size: 13px;
            color: #bfc9d9;
            margin-bottom: 3px;
        }

        .field-value {
            font-size: 17px;
            color: #ffffff;
        }

        footer {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 12px;
            color: #bfc9d9;
            border-top: 1px solid #1f2d45;
            background-color: #0d2347;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- NAVBAR OPTION C -->
<div class="top-nav">
    <div class="nav-left">
        <img src="YOUR-LOGO.png" alt="Bank Logo">
    </div>

    <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Accounts</a>
        <a href="profile.html">Profile</a>
    </div>

    <div class="nav-right">
        <img src="eric_todd.jpeg" class="profile-pic-small">
    </div>
</div>

<!-- PROFILE CONTENT -->
<div class="content">
    <h2 class="section-title">Your Profile</h2>

    <img src="eric_todd.jpeg" class="profile-large">

    <div class="field-group">
        <div class="field-label">Full Name</div>
        <div class="field-value">Eric Todd</div>
    </div>

    <div class="field-group">
        <div class="field-label">Email Address</div>
        <div class="field-value">herictodd66@gmail.com</div>
    </div>

    <div class="field-group">
        <div class="field-label">Date of Birth</div>
        <div class="field-value">March 06, 1957</div>
    </div>

    <div class="field-group">
        <div class="field-label">Gender</div>
        <div class="field-value">Male</div>
    </div>

    <div class="field-group">
        <div class="field-label">Primary Account Balance</div>
        <div class="field-value">$629,679,072.00 USD</div>
    </div>
</div>

<footer>
    © 2026 Veterans Unlimited Bank — All rights reserved.
</footer>

</body>
</html>
