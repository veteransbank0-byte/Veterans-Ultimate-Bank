<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUB – Profile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

    <!-- TOP GLASS NAVBAR -->
    <header class="topbar">
        <div class="logo">VUB</div>
        <div class="page-title">Profile</div>
        <div class="profile-area">
            <span class="notif">🔔</span>
            <img src="eric-profile.jpg" class="profile-pic" alt="Profile">
        </div>
    </header>

    <!-- FIXED SIDEBAR -->
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-section">🏠 Dashboard</a>
        <a href="accounts.html" class="sidebar-section">💳 Accounts</a>
        <a href="cards.html" class="sidebar-section">💼 Cards</a>
        <a href="payments.html" class="sidebar-section">💸 Payments</a>
        <a href="transfers.html" class="sidebar-section">🔁 Transfers</a>
        <a href="profile.html" class="sidebar-section active">👤 Profile</a>
        <a href="#" class="sidebar-section">⚙️ Settings</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <h2>Your Profile</h2>

        <section class="profile-container">

            <!-- PROFILE CARD -->
            <div class="profile-box">
                <img src="eric-profile.jpg" class="profile-large" alt="Profile">

                <h3>ERIC TODD</h3>
                <p class="email">herictodd66@gmail.com</p>
                <p class="status">Veterans Ultimate Bank Member</p>

                <button class="edit-btn">Edit Profile</button>
            </div>

            <!-- EDIT FORM -->
            <div class="edit-box">
                <h3>Edit Information</h3>

                <label>Full Name</label>
                <input type="text" value="ERIC TODD">

                <label>Email</label>
                <input type="email" value="herictodd66@gmail.com">

                <label>Phone Number</label>
                <input type="text" placeholder="(optional)">

                <label>Date of Birth</label>
                <input type="date">

                <button class="save-btn">Save Changes</button>
            </div>

        </section>

    </main>

</body>
</html>
