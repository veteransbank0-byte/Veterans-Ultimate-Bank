<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Veterans Unlimited Bank</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f4; }

        /* NAVBAR */
        .top-nav {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left img { height: 40px; border-radius: 4px; }

        .nav-center a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: bold;
        }

        .nav-center a:hover { color: #0a3d62; }

        .profile-pic {
            height: 38px;
            width: 38px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* PROFILE PAGE */
        .content {
            max-width: 800px;
            margin: 30px auto;
            background-color: #ffffff;
            padding: 20px 25px;
            border-radius: 6px;
            box-shadow: 0 0 6px rgba(0,0,0,0.05);
        }

        .section-title { font-size: 20px; color: #0a3d62; margin-bottom: 15px; }

        .profile-large {
            height: 120px;
            width: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #0a3d62;
        }

        .field-group { margin-bottom: 12px; }
        .field-label { font-size: 13px; color: #555; margin-bottom: 3px; }
        .field-value { font-size: 15px; color: #222; }

        footer {
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 12px;
            color: #777;
            border-top: 1px solid #ddd;
            background-color: #ffffff;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <img src="YOUR-LOGO.png" alt="Veterans Unlimited Bank Logo">
    </div>

    <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Accounts</a>
        <a href="profile.html">Profile</a>
    </div>

    <div class="nav-right">
        <img src="eric_todd.jpeg" class="profile-pic">
    </div>
</div>

<div class="content">
    <h2 class="section-title">Profile & Settings</h2>

    <div style="text-align:center; margin-bottom:20px;">
        <img src="eric_todd.jpeg" class="profile-large">
    </div>

    <div class="field-group">
        <div class="field-label">Full name</div>
        <div class="field-value">Eric Todd</div>
    </div>

    <div class="field-group">
        <div class="field-label">Email</div>
        <div class="field-value">herictodd66@gmail.com</div>
    </div>

    <div class="field-group">
        <div class="field-label">Date of birth</div>
        <div class="field-value">March 06, 1957</div>
    </div>

    <div class="field-group">
        <div class="field-label">Gender</div>
        <div class="field-value">Male</div>
    </div>

    <div class="field-group">
        <div class="field-label">Primary account balance</div>
        <div class="field-value">$629,679,072.00 USD</div>
    </div>
</div>

<footer>
    © 2026 Veterans Unlimited Bank — All rights reserved.
</footer>

</body>
</html>
