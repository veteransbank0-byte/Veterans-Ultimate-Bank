<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | Veterans Unlimited Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logout-box {
            background-color: #0d2347;
            padding: 30px;
            border-radius: 6px;
            border: 1px solid #1f2d45;
            text-align: center;
            width: 350px;
        }

        .logout-title {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .logout-message {
            font-size: 14px;
            color: #bfc9d9;
            margin-bottom: 25px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #1a4fa3;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-btn:hover {
            background-color: #2363c7;
        }
    </style>
</head>

<body>

<!-- Prevent logged-in users from accessing logout page -->
<script>
    if (localStorage.getItem("loggedIn")) {
        window.location.href = "dashboard.html";
    }
</script>

<div class="logout-box">
    <div class="logout-title">You Have Been Logged Out</div>
    <div class="logout-message">
        Your session has ended. For your security, please close your browser if you are on a shared device.
    </div>

    <button class="login-btn" onclick="goLogin()">Return to Login</button>
</div>

<script>
function goLogin() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
