<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        .navbar {
            background-color: #0d2347;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1c355c;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .navbar-left img {
            height: 45px;
            margin-right: 15px;
        }

        .navbar-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #9bbcff;
            font-weight: bold;
        }

        .navbar-right img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        .dashboard-container {
            width: 90%;
            max-width: 1100px;
            margin: 40px auto;
        }

        .welcome {
            font-size: 28px;
            color: #9bbcff;
            margin-bottom: 20px;
        }

        .account-summary {
            background: #0d2347;
            padding: 25px;
            border-radius: 10px;
            border: 1px solid #1c355c;
        }

        .account-card h3 {
            margin: 0;
            color: #9bbcff;
        }

        .balance {
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
            color: #d6e4ff;
        }

        .label {
            color: #9bbcff;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="navbar-left">
            <img src="VUB.png" alt="Veterans Ultimate Bank Logo">
            <div class="navbar-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
            </div>
        </div>

        <div class="navbar-right">
            <img src="eric_todd.jpeg" alt="Profile Photo">
        </div>
    </div>

    <div class="dashboard-container">
        <div class="welcome">Welcome back, Eric Todd</div>

        <div class="account-summary">
            <h2>Account Summary</h2>

            <div class="account-card">
                <h3>Primary Checking</h3>
                <p class="balance">$629,890,072.00 USD</p>
                <p class="label">Available Balance</p>
            </div>
        </div>
    </div>

</body>
</html>
