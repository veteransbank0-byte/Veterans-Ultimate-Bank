<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUB – Payments</title>
    <link rel="stylesheet" href="css/payments.css">
</head>

<body>

    <!-- TOP GLASS NAVBAR -->
    <header class="topbar">
        <div class="logo">VUB</div>
        <div class="page-title">Payments</div>
        <div class="profile-area">
            <span class="notif">🔔</span>
            <img src="profile.jpg" class="profile-pic" alt="Profile">
        </div>
    </header>

    <!-- FIXED SIDEBAR -->
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-section">🏠 Dashboard</a>
        <a href="accounts.html" class="sidebar-section">💳 Accounts</a>
        <a href="cards.html" class="sidebar-section">💼 Cards</a>
        <a href="payments.html" class="sidebar-section active">💸 Payments</a>
        <a href="transfers.html" class="sidebar-section">🔁 Transfers</a>
        <a href="#" class="sidebar-section">📊 Spending Insights</a>
        <a href="#" class="sidebar-section">📅 Subscriptions</a>
        <a href="#" class="sidebar-section">🎁 Rewards</a>
        <a href="#" class="sidebar-section">📂 Document Vault</a>
        <a href="#" class="sidebar-section">⚙️ Settings</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <h2>Make a Payment</h2>

        <section class="payment-container">

            <!-- BILL PAY FORM -->
            <div class="payment-box">
                <h3>Pay a Bill</h3>

                <label>Payee</label>
                <select>
                    <option>Georgia Power</option>
                    <option>AT&T Fiber</option>
                    <option>American Express</option>
                    <option>Water Utility</option>
                </select>

                <label>Amount</label>
                <input type="number" placeholder="$0.00">

                <label>From Account</label>
                <select>
                    <option>Checking •••• 7281</option>
                    <option>Savings •••• 9924</option>
                </select>

                <button class="pay-btn">Pay Now</button>
            </div>

            <!-- QUICK PAY SHORTCUTS -->
            <div class="quick-pay">
                <h3>Quick Payments</h3>

                <button class="quick-btn">Georgia Power – $240</button>
                <button class="quick-btn">AT&T Fiber – $120</button>
                <button class="quick-btn">Amex Platinum – $650</button>
                <button class="quick-btn">Water Utility – $89</button>
            </div>

        </section>

    </main>

</body>
</html>
