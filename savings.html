savings.html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #0d2347;
            border-bottom: 1px solid #1c355c;
        }

        header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header img {
            height: 40px;
        }

        header h1 {
            font-size: 20px;
            margin: 0;
            color: #9bbcff;
        }

        header .right {
            text-align: right;
            font-size: 14px;
        }

        #logoutBtn {
            color: #ff4d4d;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }

        .container {
            padding: 20px;
        }

        .section-title {
            margin-bottom: 10px;
            font-size: 18px;
            color: #d6e4ff;
        }

        .card {
            background-color: #0d2347;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1c355c;
            max-width: 450px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            color: #9bbcff;
            margin-bottom: 8px;
        }

        .card-amount {
            font-size: 24px;
            font-weight: bold;
        }

        .card-info {
            margin-top: 10px;
            font-size: 14px;
            color: #d6e4ff;
        }

        a.nav-link {
            color: #9bbcff;
            text-decoration: none;
            font-size: 14px;
        }

        a.nav-link:hover {
            color: #d6e4ff;
        }

        .links {
            margin-top: 15px;
            font-size: 14px;
        }

        .links a {
            display: inline-block;
            margin-right: 12px;
        }
    </style>
</head>
<body>

<script>
    if (!localStorage.getItem("loggedIn")) {
        window.location.href = "index.html";
    }
</script>

<header>
    <div class="left">
        <img src="VUB.png" alt="Bank Logo">
        <h1>Veterans Ultimate Bank</h1>
    </div>
    <div class="right">
        <span>Savings Account</span>
        <span><a id="logoutBtn">Logout</a></span>
    </div>
</header>

<div class="container">
    <div class="section-title">Savings Account Overview</div>

    <div class="card">
        <div class="card-title">Current Savings Balance</div>
        <div class="card-amount">$95,537,926.00</div>

        <div class="card-info">
            <p><strong>Account Type:</strong> High‑Yield Savings</p>
            <p><strong>Account Holder:</strong> Eric Todd</p>
            <p><strong>Location:</strong> Tampa, Florida, USA</p>
        </div>
    </div>

    <div class="links">
        <a class="nav-link" href="savings_history.html">View Full Savings History</a>
        <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
    </div>
</div>

<script>
    document.getElementById("logoutBtn").onclick = function () {
        localStorage.removeItem("loggedIn");
        sessionStorage.removeItem("welcomeShown");
        window.location.href = "index.html";
    };
</script>

</body>
</html>
