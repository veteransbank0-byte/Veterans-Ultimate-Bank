<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Payment – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        /* NAVIGATION BAR */
        .navbar {
            background-color: #0d2347;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1c355c;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .navbar-left img {
            height: 45px;
            margin-right: 15px;
        }

        .navbar-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #9bbcff;
            font-weight: bold;
        }

        .navbar-links a:hover {
            color: #d6e4ff;
        }

        .navbar-right img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* MAIN CONTAINER */
        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
        }

        .section-box {
            background-color: #0d2347;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #1c355c;
        }

        h2 {
            color: #9bbcff;
            margin-bottom: 20px;
            font-size: 26px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-size: 16px;
            color: #9bbcff;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #1c355c;
            background-color: #0b1f3d;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #1a4fa3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 25px;
        }

        button:hover {
            background-color: #2966c7;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            background-color: #102a52;
            border-radius: 6px;
            border: 1px solid #1c355c;
            display: none;
            font-size: 16px;
        }
    </style>
</head>

<body>

<script>
    if (!localStorage.getItem("loggedIn")) {
        window.location.href = "index.html";
    }
</script>

<!-- NAVIGATION BAR -->
<div class="navbar">
    <div class="navbar-left">
        <img src="VUB.png" alt="Veterans Ultimate Bank Logo">
        <div class="navbar-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="transactions.html">Checking</a>
            <a href="transfer.html">Transfer</a>
            <a href="savings.html">Savings</a>
            <a href="savings_history.html">Savings History</a>
            <a href="creditcard.html">Credit Card</a>
        </div>
    </div>

    <div class="navbar-right">
        <img src="eric_todd.jpeg" alt="Profile Photo">
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

    <div class="section-box">
        <h2>Make a Credit Card Payment</h2>

        <label>Payment Amount</label>
        <input type="number" id="amount" placeholder="Enter payment amount">

        <label>Payment Method</label>
        <select id="method">
            <option value="checking">Pay from Checking Account</option>
            <option value="savings">Pay from Savings Account</option>
        </select>

        <button onclick="submitPayment()">Submit Payment</button>

        <div class="message" id="messageBox"></div>
    </div>

</div>

<script>
    function submitPayment() {
        let amount = document.getElementById("amount").value;
        let method = document.getElementById("method").value;
        let msg = document.getElementById("messageBox");

        if (amount === "" || amount <= 0) {
            msg.style.display = "block";
            msg.innerHTML = "Please enter a valid payment amount.";
            return;
        }

        let source = method === "checking" ? "Checking Account" : "Savings Account";

        msg.style.display = "block";
        msg.innerHTML = "Payment Successful: $" + amount + " paid from your " + source + ".";
    }
</script>

</body>
</html>
