<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUB – Transfers</title>
    <link rel="stylesheet" href="css/transfers.css">
</head>

<body>

    <!-- TOP GLASS NAVBAR -->
    <header class="topbar">
        <div class="logo">VUB</div>
        <div class="page-title">Transfers</div>
        <div class="profile-area">
            <span class="notif">🔔</span>
            <img src="profile.jpg" class="profile-pic" alt="Profile">
        </div>
    </header>

    <!-- FIXED SIDEBAR -->
    <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-section">🏠 Dashboard</a>
        <a href="accounts.html" class="sidebar-section">💳 Accounts</a>
        <a href="cards.html" class="sidebar-section">💼 Cards</a>
        <a href="payments.html" class="sidebar-section">💸 Payments</a>
        <a href="transfers.html" class="sidebar-section active">🔁 Transfers</a>
        <a href="#" class="sidebar-section">📊 Spending Insights</a>
        <a href="#" class="sidebar-section">📅 Subscriptions</a>
        <a href="#" class="sidebar-section">🎁 Rewards</a>
        <a href="#" class="sidebar-section">📂 Document Vault</a>
        <a href="#" class="sidebar-section">⚙️ Settings</a>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

        <h2>Transfer Funds</h2>

        <section class="transfer-container">

            <!-- TRANSFER FORM -->
            <div class="transfer-box">
                <h3>Move Money</h3>

                <label>From Account</label>
                <select>
                    <option>Checking •••• 7281</option>
                    <option>Savings •••• 9924</option>
                </select>

                <label>To Account</label>
                <select>
                    <option>Savings •••• 9924</option>
                    <option>Checking •••• 7281</option>
                </select>

                <label>Amount</label>
                <input type="number" placeholder="$0.00">

                <button class="transfer-btn">Transfer Now</button>
            </div>

            <!-- QUICK TRANSFERS -->
            <div class="quick-transfer">
                <h3>Quick Transfers</h3>

                <button class="quick-btn">Move $500 to Savings</button>
                <button class="quick-btn">Move $1,000 to Checking</button>
                <button class="quick-btn">Move $5,000 to Savings</button>
                <button class="quick-btn">Move $10,000 to Checking</button>
            </div>

        </section>

    </main>

</body>
</html>
