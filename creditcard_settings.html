<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Settings – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        /* NAVIGATION BAR */
        .navbar {
            background-color: #0d2347;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1c355c;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .navbar-left img {
            height: 45px;
            margin-right: 15px;
        }

        .navbar-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #9bbcff;
            font-weight: bold;
        }

        .navbar-links a:hover {
            color: #d6e4ff;
        }

        .navbar-right img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* MAIN CONTAINER */
        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
        }

        .section-box {
            background-color: #0d2347;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #1c355c;
            margin-bottom: 35px;
        }

        h2 {
            color: #9bbcff;
            margin-bottom: 20px;
            font-size: 28px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-size: 16px;
            color: #9bbcff;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #1c355c;
            background-color: #0b1f3d;
            color: white;
            font-size: 16px;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-size: 18px;
        }

        .toggle-row strong {
            color: #d6e4ff;
        }

        .toggle {
            width: 50px;
            height: 26px;
            background-color: #1c355c;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
        }

        .toggle-circle {
            width: 22px;
            height: 22px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: 0.3s;
        }

        .toggle.active {
            background-color: #1a4fa3;
        }

        .toggle.active .toggle-circle {
            left: 26px;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            background-color: #1a4fa3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 25px;
        }

        .save-btn:hover {
            background-color: #2966c7;
        }

        .message {
            margin-top: 20px;
            padding: 15px;
            background-color: #102a52;
            border-radius: 6px;
            border: 1px solid #1c355c;
            display: none;
            font-size: 16px;
        }
    </style>
</head>

<body>

<script>
    if (!localStorage.getItem("loggedIn")) {
        window.location.href = "index.html";
    }
</script>

<!-- NAVIGATION BAR -->
<div class="navbar">
    <div class="navbar-left">
        <img src="VUB.png" alt="Veterans Ultimate Bank Logo">
        <div class="navbar-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="transactions.html">Checking</a>
            <a href="transfer.html">Transfer</a>
            <a href="savings.html">Savings</a>
            <a href="savings_history.html">Savings History</a>
            <a href="creditcard.html">Credit Card</a>
        </div>
    </div>

    <div class="navbar-right">
        <img src="eric_todd.jpeg" alt="Profile Photo">
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

    <div class="section-box">
        <h2>Credit Card Settings</h2>

        <!-- CARD CONTROLS -->
        <div class="toggle-row">
            <strong>Freeze Card</strong>
            <div class="toggle" onclick="toggleSwitch(this)">
                <div class="toggle-circle"></div>
            </div>
        </div>

        <div class="toggle-row">
            <strong>Enable International Purchases</strong>
            <div class="toggle" onclick="toggleSwitch(this)">
                <div class="toggle-circle"></div>
            </div>
        </div>

        <div class="toggle-row">
            <strong>Enable Online Purchases</strong>
            <div class="toggle" onclick="toggleSwitch(this)">
                <div class="toggle-circle"></div>
            </div>
        </div>

        <div class="toggle-row">
            <strong>Enable ATM Withdrawals</strong>
            <div class="toggle" onclick="toggleSwitch(this)">
                <div class="toggle-circle"></div>
            </div>
        </div>

        <!-- ALERT SETTINGS -->
        <label>Alert Type</label>
        <select id="alertType">
            <option value="all">All Transactions</option>
            <option value="large">Only Large Purchases</option>
            <option value="international">International Purchases</option>
        </select>

        <button class="save-btn" onclick="saveSettings()">Save Settings</button>

        <div class="message" id="messageBox"></div>
    </div>

</div>

<script>
    function toggleSwitch(element) {
        element.classList.toggle("active");
    }

    function saveSettings() {
        let msg = document.getElementById("messageBox");
        msg.style.display = "block";
        msg.innerHTML = "Your credit card settings have been updated successfully.";
    }
</script>

</body>
</html>
