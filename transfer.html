<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: #0d2347;
            border-bottom: 1px solid #1c355c;
        }

        header .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header img {
            height: 40px;
        }

        header h1 {
            font-size: 20px;
            margin: 0;
            color: #9bbcff;
        }

        header .right {
            text-align: right;
            font-size: 14px;
        }

        #logoutBtn {
            color: #ff4d4d;
            font-weight: bold;
            cursor: pointer;
        }

        .container {
            padding: 20px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 10px;
            color: #d6e4ff;
        }

        .card {
            background-color: #0d2347;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #1c355c;
            max-width: 450px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-size: 14px;
            color: #9bbcff;
        }

        select, input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #1c355c;
            background-color: #0b1f3d;
            color: white;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #1e4fa8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2a63c7;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            background-color: #102a52;
            border-radius: 6px;
            border: 1px solid #1c355c;
            display: none;
        }

        a.nav-link {
            color: #9bbcff;
            text-decoration: none;
            font-size: 14px;
        }

        a.nav-link:hover {
            color: #d6e4ff;
        }
    </style>
</head>
<body>

<script>
    if (!localStorage.getItem("loggedIn")) {
        window.location.href = "index.html";
    }
</script>

<header>
    <div class="left">
        <img src="VUB.png" alt="Bank Logo">
        <h1>Veterans Ultimate Bank</h1>
    </div>
    <div class="right">
        <span>Transfer Money</span>
        <span><a id="logoutBtn">Logout</a></span>
    </div>
</header>

<div class="container">
    <div class="section-title">Move Money Between Accounts</div>

    <div class="card">
        <label>Transfer Type</label>
        <select id="transferType">
            <option value="checkingToSavings">Checking → Savings</option>
            <option value="savingsToChecking">Savings → Checking</option>
        </select>

        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter amount">

        <button onclick="submitTransfer()">Submit Transfer</button>

        <div class="message" id="messageBox"></div>
    </div>

    <p style="margin-top:15px;">
        <a class="nav-link" href="dashboard.html">Back to Dashboard</a>
    </p>
</div>

<script>
    function submitTransfer() {
        let type = document.getElementById("transferType").value;
        let amount = document.getElementById("amount").value;
        let msg = document.getElementById("messageBox");

        if (amount === "" || amount <= 0) {
            msg.style.display = "block";
            msg.innerHTML = "Please enter a valid amount.";
            return;
        }

        if (type === "checkingToSavings") {
            msg.style.display = "block";
            msg.innerHTML = "Transfer Successful: $" + amount + " moved from Checking → Savings.";
        } else {
            msg.style.display = "block";
            msg.innerHTML = "Transfer Successful: $" + amount + " moved from Savings → Checking.";
        }
    }

    document.getElementById("logoutBtn").onclick = function () {
        localStorage.removeItem("loggedIn");
        sessionStorage.removeItem("welcomeShown");
        window.location.href = "index.html";
    };
</script>

</body>
</html>
