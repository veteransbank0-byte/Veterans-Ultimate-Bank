<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Veterans Ultimate Bank — Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b263b;
      --accent: #3a6ff8;
      --bg-soft: #f5f6f7;
      --card-bg: #ffffff;
      --text-main: #111827;
      --text-muted: #6b7280;
      --shadow-soft: 0 10px 25px rgba(15, 23, 42, 0.08);
      --radius-card: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--navy);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .signup-card {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      padding: 28px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-soft);
    }

    .logo {
      text-align: center;
      margin-bottom: 18px;
    }

    .logo-circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3a6ff8, #60a5fa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 10px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy-light);
      line-height: 1.2;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .signup-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #3a6ff8, #60a5fa);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35);
      transition: transform 0.1s ease;
    }

    .signup-btn:hover {
      transform: translateY(-1px);
    }

    .error {
      color: #b91c1c;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .success {
      color: #16a34a;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .login-link {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
    }

    .login-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="signup-card">
    <div class="logo">
      <div class="logo-circle">V</div>
      <div class="logo-text">Veterans<br>Ultimate Bank</div>
    </div>

    <div class="input-group">
      <label class="input-label">Create Username</label>
      <input id="newUsername" class="input-field" type="text" placeholder="Enter username" />
    </div>

    <div class="input-group">
      <label class="input-label">Create Password</label>
      <input id="newPassword" class="input-field" type="password" placeholder="Enter password" />
    </div>

    <div class="input-group">
      <label class="input-label">Confirm Password</label>
      <input id="confirmPassword" class="input-field" type="password" placeholder="Confirm password" />
    </div>

    <button class="signup-btn" onclick="signup()">Create Account</button>

    <div id="error" class="error">Passwords do not match</div>
    <div id="success" class="success">Account created! Redirecting...</div>

    <div class="login-link">
      Already have an account? <a href="index.html">Login</a>
    </div>
  </div>

  <script>
    function signup() {
      const user = document.getElementById("newUsername").value.trim();
      const pass = document.getElementById("newPassword").value.trim();
      const confirm = document.getElementById("confirmPassword").value.trim();
      const error = document.getElementById("error");
      const success = document.getElementById("success");

      error.style.display = "none";
      success.style.display = "none";

      if (!user || !pass || !confirm) {
        error.textContent = "All fields are required";
        error.style.display = "block";
        return;
      }

      if (pass !== confirm) {
        error.textContent = "Passwords do not match";
        error.style.display = "block";
        return;
      }

      // Save new account
      localStorage.setItem("newUsername", user);
      localStorage.setItem("newPassword", pass);

      success.style.display = "block";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);
    }
  </script>

</body>
</html>
