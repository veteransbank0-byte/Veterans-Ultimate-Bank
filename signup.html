<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Veterans Ultimate Bank — Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --bg-dark: #0a0f1a;
      --card-dark: #111827;
      --text-light: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #3a6ff8;
      --accent-light: #60a5fa;
      --shadow-dark: 0 10px 25px rgba(0, 0, 0, 0.45);
      --radius-card: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg-dark);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
      color: var(--text-light);
    }

    .signup-card {
      width: 100%;
      max-width: 380px;
      background: var(--card-dark);
      padding: 28px;
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-dark);
    }

    .logo {
      text-align: center;
      margin-bottom: 18px;
    }

    .signup-logo {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 auto 12px;
      border-radius: 12px;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-light);
      line-height: 1.2;
    }

    .input-group {
      margin-bottom: 14px;
    }

    .input-label {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 4px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #1f2937;
      color: var(--text-light);
    }

    .signup-btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35);
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .success {
      color: #16a34a;
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .login-link {
      margin-top: 14px;
      text-align: center;
      font-size: 13px;
    }

    .login-link a {
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="signup-card">
    <div class="logo">
      <img src="your-logo.jpeg" alt="VUB Logo" class="signup-logo">
      <div class="logo-text">Veterans<br>Ultimate Bank</div>
    </div>

    <div class="input-group">
      <label class="input-label">Create Username</label>
      <input id="newUsername" class="input-field" type="text" placeholder="Enter username" />
    </div>

    <div class="input-group">
      <label class="input-label">Create Password</label>
      <input id="newPassword" class="input-field" type="password" placeholder="Enter password" />
    </div>

    <div class="input-group">
      <label class="input-label">Confirm Password</label>
      <input id="confirmPassword" class="input-field" type="password" placeholder="Confirm password" />
    </div>

    <button class="signup-btn" onclick="signup()">Create Account</button>

    <div id="error" class="error">Passwords do not match</div>
    <div id="success" class="success">Account created! Redirecting...</div>

    <div class="login-link">
      Already have an account? <a href="index.html">Login</a>
    </div>
  </div>

  <script>
    async function signup() {
      const user = document.getElementById("newUsername").value.trim();
      const pass = document.getElementById("newPassword").value.trim();
      const confirm = document.getElementById("confirmPassword").value.trim();
      const error = document.getElementById("error");
      const success = document.getElementById("success");

      error.style.display = "none";
      success.style.display = "none";

      if (!user || !pass || !confirm) {
        error.textContent = "All fields are required";
        error.style.display = "block";
        return;
      }

      if (pass !== confirm) {
        error.textContent = "Passwords do not match";
        error.style.display = "block";
        return;
      }

      const response = await fetch("http://localhost:4000/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: user, password: pass })
      });

      const data = await response.json();

      if (!response.ok) {
        error.textContent = data.message;
        error.style.display = "block";
        return;
      }

      success.style.display = "block";

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1500);
    }
  </script>

</body>
</html>
