<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterans Ultimate Bank — Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: white;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: #111;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 30px;
            border-right: 1px solid #222;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 22px;
            color: #00aaff;
        }

        .sidebar a {
            display: block;
            padding: 14px 25px;
            color: #ccc;
            text-decoration: none;
            font-size: 16px;
        }

        .sidebar a:hover {
            background: #1a1a1a;
            color: white;
        }

        .main {
            margin-left: 260px;
            padding: 30px;
        }

        .header {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        .card h3 {
            margin: 0 0 10px;
            font-size: 18px;
            color: #00aaff;
        }

        .balance {
            font-size: 28px;
            font-weight: bold;
            margin-top: 10px;
        }

        .quick-actions {
            margin-top: 40px;
        }

        .quick-actions button {
            background: #00aaff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        .quick-actions button:hover {
            background: #0088cc;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>VUB Dashboard</h2>
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="account.html">💳 Accounts</a>
        <a href="transactions.html">📄 Transactions</a>
        <a href="payments.html">💸 Payments</a>
        <a href="transfers.html">🔁 Transfers</a>
        <a href="cards.html">💳 Cards</a>
        <a href="subscriptions.html">📦 Subscriptions</a>
        <a href="rewards.html">🎁 Rewards</a>
        <a href="settings.html">⚙️ Settings</a>
    </div>

    <div class="main">
        <div class="header">Welcome back, Eric Todd</div>

        <div class="card-container">

            <div class="card">
                <h3>Checking Account</h3>
                <div class="balance">$4,920.55</div>
            </div>

            <div class="card">
                <h3>Savings Account</h3>
                <div class="balance">$12,440.22</div>
            </div>

            <div class="card">
                <h3>Credit Card Balance</h3>
                <div class="balance">$1,120.00</div>
            </div>

            <div class="card">
                <h3>Loan Overview</h3>
                <div class="balance">$8,300 Remaining</div>
            </div>

        </div>

        <div class="quick-actions">
            <button onclick="location.href='payments.html'">Make Payment</button>
            <button onclick="location.href='transfers.html'">Transfer Funds</button>
            <button onclick="location.href='transactions.html'">View Transactions</button>
        </div>

    </div>

</body>
</html>
