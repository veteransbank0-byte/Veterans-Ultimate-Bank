<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Sent – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .reset-box {
            background-color: #0d2347;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            border-radius: 12px;
            border: 1px solid #1c355c;
            text-align: center;
        }

        .reset-box img {
            height: 60px;
            margin-bottom: 20px;
        }

        h2 {
            color: #9bbcff;
            margin-bottom: 15px;
        }

        p {
            color: #d6e4ff;
            font-size: 16px;
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #1a4fa3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2966c7;
        }
    </style>
</head>

<body>

    <div class="reset-box">
        <img src="VUB.png" alt="Veterans Ultimate Bank Logo">

        <h2>Reset Link Sent</h2>

        <p>
            If an account exists with that email, a password reset link has been sent.
            Please check your inbox.
        </p>

        <button onclick="window.location.href='login.html'">Return to Login</button>
    </div>

</body>
</html>
