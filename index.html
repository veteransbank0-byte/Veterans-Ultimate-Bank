<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterans Unlimited Bank</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background-color: #f4f4f4; }

        /* NAVBAR */
        .top-nav {
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding: 10px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-left img {
            height: 40px;
            border-radius: 4px;
        }

        .nav-center a {
            margin: 0 15px;
            text-decoration: none;
            color: #333;
            font-size: 15px;
            font-weight: bold;
        }

        .nav-center a:hover { color: #0a3d62; }

        .profile-pic {
            height: 38px;
            width: 38px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* MAIN */
        .main-wrapper {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .hero-content { max-width: 600px; margin-right: 40px; }
        .hero-title { font-size: 32px; color: #0a3d62; margin-bottom: 10px; }
        .hero-text { font-size: 16px; line-height: 1.6; color: #444; }

        .login-panel {
            width: 320px;
            background-color: #ffffff;
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
            padding: 20px;
        }

        .login-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #0a3d62; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
        .form-group input {
            width: 100%; padding: 8px; font-size: 14px;
            border: 1px solid #ccc; border-radius: 4px;
        }

        .login-button {
            width: 100%; margin-top: 10px; padding: 10px;
            background-color: #0a3d62; color: #ffffff; border: none;
            border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: bold;
        }

        .login-button:hover { background-color: #064066; }

        footer {
            margin-top: 40px; padding: 20px 30px; font-size: 12px;
            color: #777; border-top: 1px solid #ddd; background-color: #ffffff; text-align: center;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <img src="YOUR-LOGO.png" alt="Veterans Unlimited Bank Logo">
    </div>

    <div class="nav-center">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Accounts</a>
        <a href="profile.html">Profile</a>
    </div>

    <div class="nav-right">
        <img src="eric_todd.jpeg" class="profile-pic">
    </div>
</div>

<div class="main-wrapper">
    <div class="hero-content">
        <h1 class="hero-title">Banking built for those who served.</h1>
        <p class="hero-text">
            Welcome back, <strong>Eric Todd</strong>.  
            Manage your finances with secure, modern digital banking designed for veterans.
        </p>
    </div>

    <div class="login-panel">
        <div class="login-title">Sign in to your account</div>
        <form action="dashboard.html" method="get">
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter password">
            </div>
            <button class="login-button" type="submit">Sign in</button>
        </form>
    </div>
</div>

<footer>
    © 2026 Veterans Unlimited Bank — Built by Veterans, for Veterans.
</footer>

</body>
</html>
