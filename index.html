<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Veterans Ultimate Bank — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="css/index.css">
</head>

<body>

  <div class="auth-container">
    <div class="glass-card auth-card">

      <div class="logo">
        <img src="vub-logo.png" alt="VUB Logo" class="login-logo">
        <div class="logo-text">Veterans Ultimate Bank</div>
      </div>

      <label class="input-label">Username</label>
      <input id="username" class="input-field" type="text" placeholder="Enter username">

      <label class="input-label">Password</label>
      <input id="password" class="input-field" type="password" placeholder="Enter password">

      <button class="auth-btn" onclick="login()">Login</button>

      <div id="error" class="error">Invalid login</div>

    </div>
  </div>

  <script>
    function login() {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if (user === "EricTodd@$" && pass === "EricTodd@1$") {
        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("profileName", "Eric Todd");
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("error").style.display = "block";
      }
    }
  </script>

</body>
</html>
