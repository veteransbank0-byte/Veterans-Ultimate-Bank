<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VUB - Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="auth-container">
        <div class="glass-card auth-card">

            <!-- VUB LOGO -->
            <div class="logo">
                <img src="vub-logo.png" alt="VUB Logo" class="login-logo">
            </div>

            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to Veterans Ultimate Bank</p>

            <label>Email</label>
            <input id="email" type="email" placeholder="you@example.com">

            <label>Password</label>
            <input id="password" type="password" placeholder="Enter your password">

            <button class="auth-btn" onclick="login()">Login</button>

            <div class="links">
                <a href="forgot.html">Forgot Password</a>
                <a href="register.html">Create Account</a>
            </div>

        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById("email").value.trim();
            const pass = document.getElementById("password").value.trim();

            const validEmail = "EricTodd@$";
            const validPass = "EricTodd@1$";

            if (email === validEmail && pass === validPass) {
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("profileName", "Eric Todd");
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid login. Please try again.");
            }
        }
    </script>

</body>
</html>
