<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veterans Ultimate Bank – Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
        }

        /* NAVIGATION BAR */
        .navbar {
            background-color: #0d2347;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #1c355c;
        }

        .navbar-left {
            display: flex;
            align-items: center;
        }

        .navbar-left img {
            height: 45px;
            margin-right: 15px;
        }

        .navbar-links a {
            margin: 0 15px;
            text-decoration: none;
            color: #9bbcff;
            font-weight: bold;
        }

        .navbar-links a:hover {
            color: #d6e4ff;
        }

        .navbar-right img {
            height: 45px;
            width: 45px;
            border-radius: 50%;
            object-fit: cover;
        }

        /* HERO SECTION */
        .hero {
            padding: 90px 40px;
            background-color: #0d2347;
            border-bottom: 1px solid #1c355c;
            text-align: left;
        }

        .hero h1 {
            font-size: 46px;
            color: #9bbcff;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 22px;
            color: #d6e4ff;
            margin-bottom: 30px;
        }

        .hero button {
            background-color: #1a4fa3;
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 6px;
            font-size: 20px;
            cursor: pointer;
        }

        .hero button:hover {
            background-color: #2966c7;
        }
    </style>
</head>

<body>

    <!-- NAVIGATION BAR -->
    <div class="navbar">
        <div class="navbar-left">
            <img src="VUB.png" alt="Veterans Ultimate Bank Logo">
            <div class="navbar-links">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="profile.html">Profile</a>
                <a href="transactions.html">Transactions</a>
                <a href="transfer.html">Transfer</a>
            </div>
        </div>

        <div class="navbar-right">
            <img src="eric_todd.jpeg" alt="Profile Photo">
        </div>
    </div>

    <!-- HERO SECTION -->
    <div class="hero">
        <h1>Welcome to Veterans Ultimate Bank</h1>
        <p>Your trusted financial partner, built for security, reliability, and your future.</p>
        <button onclick="window.location.href='dashboard.html'">Access Your Account</button>
    </div>

</body>
</html>
