index.html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Veterans Ultimate Bank</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a1a33;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background-color: #0d2347;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            border-radius: 12px;
            border: 1px solid #1c355c;
            text-align: center;
        }

        .login-box img {
            height: 60px;
            margin-bottom: 20px;
        }

        h2 {
            color: #9bbcff;
            margin-bottom: 25px;
        }

        label {
            float: left;
            margin-bottom: 5px;
            color: #d6e4ff;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #1c355c;
            background-color: #0a1f3d;
            color: white;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: #1a4fa3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2966c7;
        }

        .links {
            margin-top: 20px;
        }

        .links a {
            color: #9bbcff;
            text-decoration: none;
            font-size: 14px;
        }

        .links a:hover {
            color: #d6e4ff;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <img src="VUB.png" alt="Veterans Ultimate Bank Logo">

        <h2>Account Login</h2>

        <form onsubmit="return loginUser();">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <a href="forgotpassword.html">Forgot Password?</a><br>
            <a href="signup.html">Create Account</a>
        </div>
    </div>

    <script>
        function loginUser() {
            // Your real login credentials
            const correctUsername = "EricTodd";
            const correctPassword = "InGODwetrust";

            // What the user typed
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // Check if they match
            if (user === correctUsername && pass === correctPassword) {
                localStorage.setItem("loggedIn", "true");
                window.location.href = "dashboard.html";
                return false;
            } else {
                alert("Incorrect username or password");
                return false;
            }
        }
    </script>

</body>
</html>
